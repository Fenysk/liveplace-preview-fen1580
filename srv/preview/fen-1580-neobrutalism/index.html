    <!--
      Preload the "Press Start 2P" display face (FEN-321). The @font-face lives in
      fonts.css, but with `font-display: swap` the browser only discovers it AFTER
      CSS parse + layout finds an element using `--font-display` — so the wordmark
      and the suddenly-appearing celebration headline first paint in the Inter
      fallback, then swap. Fetching the woff2 at parse time (high priority) makes
      it ready before first paint, killing that fallback flash. `crossorigin` is
      required so this request matches the later anonymous-CORS font fetch.
    -->
    <link
      rel="preload"
      href="/preview/fen-1580-neobrutalism/fonts/press-start-2p-latin-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Open Graph (FEN-373, FEN-396) — brand fallback for all SPA routes; canvas pages get
         dynamic tags via the /api/og/c/:slug Convex endpoint (bot UA → Caddy rewrite).
         og:image must be an absolute URL (platforms reject relative paths) and PNG/JPG
         (SVG is not rendered by Facebook, Twitter/X, or Discord). -->
