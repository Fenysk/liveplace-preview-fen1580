<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="LivePlace">
  <!-- The "live pixel" mark: coral square (brand accent) + inner light dot.
       Square corners = Arcade direction (radius-control = 4px). -->
  <rect width="32" height="32" rx="4" fill="#ef4d3a"/>
  <rect x="11" y="11" width="10" height="10" rx="2" fill="#ffffff"/>
</svg>
